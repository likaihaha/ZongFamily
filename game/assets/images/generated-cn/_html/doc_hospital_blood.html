<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.32), transparent 24%),
        repeating-linear-gradient(0deg, rgba(39,32,25,0.035) 0 1px, transparent 1px 7px),
        hsl(44 33% 85%);
      color: #2e2921;
      font-family: "Microsoft YaHei", "SimSun", "Noto Serif CJK SC", serif;
    }
    .sheet {
      position: absolute;
      left: 126px;
      top: 52px;
      width: 1028px;
      height: 620px;
      padding: 48px 58px;
      background: #fbf4e6;
      border: 2px solid rgba(72,54,37,0.32);
      box-shadow: 0 24px 58px rgba(34,25,16,0.22);
      transform: rotate(0.6deg);
    }
    .sheet::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(112,89,61,0.22);
      pointer-events: none;
    }
    .header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      border-bottom: 3px double rgba(70,54,39,0.45);
      padding-bottom: 22px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 46px;
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 800;
    }
    .subtitle {
      font-size: 24px;
      color: #695d4d;
    }
    .stamp {
      width: 168px;
      height: 168px;
      border: 8px solid rgba(137,32,28,0.64);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: rgba(137,32,28,0.74);
      font-size: 30px;
      font-weight: 800;
      transform: rotate(-12deg);
      text-align: center;
      line-height: 1.12;
    }
    .rows {
      margin-top: 38px;
      display: grid;
      gap: 18px;
    }
    .row {
      display: grid;
      grid-template-columns: 74px 1fr 180px;
      align-items: center;
      min-height: 54px;
      border-bottom: 1px solid rgba(64,52,38,0.26);
      font-size: 27px;
    }
    .row span {
      color: rgba(58,48,38,0.42);
      font-family: Consolas, monospace;
    }
    .row strong {
      font-weight: 650;
      letter-spacing: 0;
    }
    .row i {
      height: 18px;
      background: rgba(42,36,29,0.13);
      border-radius: 2px;
    }
    .basis {
      position: absolute;
      left: 58px;
      bottom: 38px;
      color: rgba(48,40,31,0.5);
      font-size: 20px;
    }
    .redline {
      position: absolute;
      left: 0;
      top: 292px;
      width: 100%;
      height: 30px;
      background: rgba(135,35,29,0.1);
    }
    .clip {
      position: absolute;
      right: 96px;
      top: 24px;
      width: 92px;
      height: 28px;
      border-radius: 16px;
      background: linear-gradient(90deg, #888, #dad3c6, #777);
      opacity: 0.58;
      transform: rotate(4deg);
    }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="redline"></div>
    <div class="clip"></div>
    <div class="header">
      <div>
        <h1>住院样本留存单</h1>
        <div class="subtitle">县人民医院 2020</div>
      </div>
      <div class="stamp">样本留存</div>
    </div>
    <div class="rows">
    <div class="row">
      <span>01</span>
      <strong>患者：宗世昌</strong>
      <i></i>
    </div>
  
    <div class="row">
      <span>02</span>
      <strong>样本类型：外周血</strong>
      <i></i>
    </div>
  
    <div class="row">
      <span>03</span>
      <strong>编号：YS2020-0317</strong>
      <i></i>
    </div>
  
    <div class="row">
      <span>04</span>
      <strong>用于司法鉴定</strong>
      <i></i>
    </div>
  </div>
    <div class="basis">依据美术提示词：医院档案</div>
  </div>
</body>
</html>
